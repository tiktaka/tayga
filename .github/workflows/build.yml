name: Build image

on:
  push:

jobs:
  build:
    name: Build image
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push (tayga)
        uses: docker/build-push-action@v6
        with:
          context: ./tayga
          push: true
          pull: true
          platforms: linux/amd64,linux/arm,linux/arm64
          tags: ghcr.io/${{ github.repository_owner }}/tayga:latest
          
      - name: Build & Push (unbound-dns64)
        uses: docker/build-push-action@v6
        with:
          context: ./unbound-dns64
          push: true
          pull: true
          platforms: linux/amd64,linux/arm,linux/arm64
          tags: ghcr.io/${{ github.repository_owner }}/unbound-dns64:latest